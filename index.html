<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時庫存查詢系統</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2ecc71; /* 調整為更明亮活力的綠活品牌綠 */
            --accent-blue: #3498db;
            --bg-color: #f1fcf1; /* 淡綠色背景 */
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --danger-color: #e53e3e;
            --danger-hover: #c53030;
            --brand-green: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-color);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* 密碼驗證畫面 */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .login-logo {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .login-input {
            width: 100%;
            height: 48px;
            padding: 10px 45px 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input:focus {
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            background-color: var(--brand-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #219653;
        }

        .login-error {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }

        /* 登出按鈕 */
        .logout-btn-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-logout {
            background-color: transparent;
            color: #718096;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background-color: #edf2f7;
            color: var(--danger-color);
            border-color: #fed7d7;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: none; 
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.05) 0%, rgba(241, 252, 241, 0) 100%);
            border-radius: 8px;
        }

        /* Logo 容器樣式 */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-main-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--brand-green);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        h1 {
            color: var(--primary-color);
            font-size: 22px;
            margin-top: 5px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 13px;
        }

        /* 刷新資訊列樣式 */
        .refresh-info {
            font-size: 13px;
            color: #718096;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #last-update-time {
            font-weight: 600;
            color: var(--primary-color);
        }

        #next-update-countdown {
            font-weight: 600;
            color: var(--brand-green);
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
            background: #f0fff4;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        @media (min-width: 768px) {
            .control-panel {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: flex-end;
        }

        label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 14px;
        }

        select, input {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text-color);
            width: 100%;
            height: 44px;
        }

        select:focus, input:focus {
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
        }

        .btn-clear {
            width: 100%;
            height: 44px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 15px;
            table-layout: fixed;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 16px;
            font-weight: 600;
            white-space: nowrap;
        }

        th:nth-child(1), td:nth-child(1) { width: 12%; }
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 23%; }
        th:nth-child(4), td:nth-child(4) { width: 10%; }
        th:nth-child(5), td:nth-child(5) { width: 16%; }
        th:nth-child(6), td:nth-child(6) { width: 27%; }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            word-wrap: break-word;
            word-break: break-all;
        }

        tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        .stock-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            width: 100%;
        }

        .main-stock {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
        }

        .stock-badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: flex-end;
            width: 100%;
            max-width: 100%;
            margin-top: 2px;
        }

        .stock-badge-pill-f1 {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .stock-badge-pill-f2 {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #f0fff4;
            color: #22543d;
            border: 1px solid #c6f6d5;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .no-other-stock {
            font-size: 11px;
            color: #a0aec0;
            font-style: italic;
        }

        .status-message {
            text-align: center;
            padding: 20px;
            font-size: 16px;
            color: #718096;
        }

        .loading {
            color: var(--brand-green);
            font-weight: bold;
        }

        .error {
            color: #e53e3e;
            background: #fff5f5;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #fed7d7;
        }

        @media (max-width: 767px) {
            body { padding: 10px 5px; }
            .container { padding: 15px 12px; border-radius: 8px; }
            .table-container { border: none; overflow: hidden; }
            table { display: block; table-layout: auto; width: 100%; }
            thead { display: none; }
            tbody { display: block; width: 100%; }
            tr { display: block; background: #ffffff; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); width: 100%; }
            tr:nth-child(even) { background-color: #ffffff; }
            td { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px dashed #edf2f7; width: 100% !important; text-align: right; font-size: 14px; gap: 15px; }
            td:last-child { border-bottom: none; padding-bottom: 0; margin-top: 5px; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--primary-color); text-align: left; flex-shrink: 0; width: 32%; }
            td > span, td > div { max-width: 65%; text-align: right; word-wrap: break-word; word-break: break-all; }
            .stock-container { align-items: flex-end; width: 100%; }
            .stock-badges-grid { justify-content: flex-end; margin-top: 4px; max-width: 100%; }
        }
    </style>
</head>
<body>

<!-- 密碼驗證鎖定畫面 -->
<div id="login-overlay">
    <div class="login-card">
        <div class="login-logo">
            <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85C50 85 25 65 25 45C25 25 45 20 50 35C55 20 75 25 75 45C75 65 50 85 50 85Z" fill="#2ecc71" opacity="0.15"/>
                <path d="M50 80C50 80 30 62 30 45C30 30 45 27 50 38C55 27 70 30 70 45C70 62 50 80 50 80Z" fill="#27ae60" opacity="0.85"/>
                <path d="M28 44C28 32 38 24 50 24C62 24 72 32 72 44C60 41 40 41 28 44Z" fill="#f39c12"/>
                <path d="M47 43H53V72C53 74 51 75 49 75C47 75 47 74 47 72V43Z" fill="#f1c40f"/>
                <circle cx="40" cy="32" r="3" fill="#ffffff" opacity="0.7"/>
                <circle cx="60" cy="34" r="2.5" fill="#ffffff" opacity="0.7"/>
            </svg>
            <span class="logo-main-title" style="margin-top: 10px;">Green Living</span>
        </div>
        <p style="margin-bottom: 25px; color: #718096; font-size: 14px;">此系統包含商業內部庫存機密，請輸入密碼以進行查詢</p>
        
        <div class="login-input-group">
            <input type="password" id="password-input" class="login-input" placeholder="請輸入登入密碼..." autofocus>
            <button class="toggle-password" id="btn-toggle-pwd" type="button" title="顯示/隱藏密碼">
                <svg id="eye-icon" style="width:20px; height:20px; fill:currentColor;" viewBox="0 0 24 24">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </button>
        </div>
        <button class="login-btn" id="btn-submit-pwd">確認驗證</button>
        <div class="login-error" id="login-error-msg">密碼錯誤，請重新輸入</div>
    </div>
</div>

<!-- 主功能容器 -->
<div class="container" id="app-container">
    <div class="logout-btn-container">
        <button class="btn-logout" id="btn-logout" type="button">
            <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24">
                <path d="M14.08 15.59L16.67 13H7V11H16.67L14.08 8.41L15.5 7L20.5 12L15.5 17L14.08 15.59M19 3A2 2 0 0 1 21 5V9.67L19 7.67V5H5V19H19V16.33L21 14.33V19A2 2 0 0 1 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H19Z"/>
            </svg>
            安全登出
        </button>
    </div>

    <header>
        <div class="logo-container">
            <svg width="46" height="46" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85C50 85 25 65 25 45C25 25 45 20 50 35C55 20 75 25 75 45C75 65 50 85 50 85Z" fill="#2ecc71" opacity="0.15"/>
                <path d="M50 80C50 80 30 62 30 45C30 30 45 27 50 38C55 27 70 30 70 45C70 62 50 80 50 80Z" fill="#27ae60" opacity="0.85"/>
                <path d="M28 44C28 32 38 24 50 24C62 24 72 32 72 44C60 41 40 41 28 44Z" fill="#f39c12"/>
                <path d="M47 43H53V72C53 74 51 75 49 75C47 75 47 74 47 72V43Z" fill="#f1c40f"/>
                <circle cx="40" cy="32" r="3" fill="#ffffff" opacity="0.7"/>
                <circle cx="60" cy="34" r="2.5" fill="#ffffff" opacity="0.7"/>
            </svg>
            <div class="logo-text">
                <span class="logo-main-title">Green Living</span>
            </div>
        </div>
        <h1>即時庫存查詢系統</h1>
        <div class="subtitle">資料來源：Google Sheets 雲端試算表</div>
        <div class="refresh-info" id="refresh-info-panel" style="display: none;">
            <span>數據刷新時間：<span id="last-update-time">載入中...</span></span>
            <span>(<span id="next-update-countdown">30</span> 秒後自動更新)</span>
        </div>
    </header>

    <div id="status" class="status-message loading" style="display: none;">正在從 Google Sheets 載入最新庫存資料...</div>

    <div id="main-content" style="display: none;">
        <!-- 四欄控制選單 -->
        <div class="control-panel">
            <div class="form-group">
                <label for="factory-select">1. 選擇廠別：</label>
                <select id="factory-select">
                    <option value="">-- 全部廠別 --</option>
                    <option value="factory1">一廠</option>
                    <option value="factory2">二廠</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="warehouse-select">2. 選擇主查詢倉庫：</label>
                <select id="warehouse-select">
                    <!-- 動態載入選單內容 -->
                </select>
            </div>

            <div class="form-group">
                <label for="category-select">3. 選擇品類 (A欄)：</label>
                <select id="category-select">
                    <option value="ALL">-- 全部品類 --</option>
                    <!-- 動態載入品類選項 -->
                </select>
            </div>

            <div class="form-group">
                <label for="search-input">4. 關鍵字快速搜尋：</label>
                <input type="text" id="search-input" placeholder="輸入代號、品名或單位搜尋...">
            </div>
        </div>

        <div style="margin-bottom: 20px; display: flex; justify-content: flex-end;">
            <div style="width: 100%; max-width: 180px;">
                <button type="button" id="btn-clear-all" class="btn-clear">
                    <svg style="width:16px; height:16px; fill:currentColor;" viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    全部清空
                </button>
            </div>
        </div>

        <div class="table-container">
            <table id="stock-table">
                <thead>
                    <tr id="table-header">
                        <th>品類</th>
                        <th>品項代號</th>
                        <th>品名</th>
                        <th>庫存單位</th>
                        <th>所屬倉庫</th>
                        <th style="text-align: right;">當前庫存 / 其他倉庫</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- 動態產生表格內容 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqhij3tYIKCP5YwznxO0uCrthJDE09xE8pOG76mejZDrH6xFyPRndBKnx9UBwQmnxxyvcE9vUUZJqk/pub?gid=322034433&single=true&output=csv";
    const SYSTEM_PASSWORD = "54039755";
    const AUTH_TIMEOUT = 24 * 60 * 60 * 1000; 

    let rawData = [];
    let headers = [];
    let isFirstLoad = true;
    let countdown = 30;
    let countdownInterval = null;
    
    const colNameCategory = 0;
    const colNameProductCode = 1;
    const colNameProductName = 2;
    const colNameUnit = 3;
    const colNameWarehouse = 4;
    let colNameQty = -1;

    const factoryWarehouseMap = {
        factory1: [
            "63-7倉",
            "63-6倉/上層",
            "63-5倉/常溫料架區",
            "車棚1倉/包材倉",
            "車棚2倉/久儲包材倉",
            "63-5倉/低溫倉",
            "63-6倉/下層/理貨倉"
        ],
        factory2: [
            "綠園二廠/總倉",
            "綠園二廠/包材倉",
            "綠園二廠/待處理倉",
            "綠園二廠/常溫區",
            "包裝/原料倉",
            "包裝/成品倉",
            "包裝/成品二倉"
        ]
    };

    const whOrderMap = {};
    factoryWarehouseMap.factory1.forEach((name, index) => { whOrderMap[name] = { factory: 'factory1', score: index }; });
    factoryWarehouseMap.factory2.forEach((name, index) => { whOrderMap[name] = { factory: 'factory2', score: index }; });

    const categoryOrderMap = {};
    const categoryTree = [
        "菇類", "香菇", "杏鮑菇", "木耳", "銀耳", "金針", "鴻喜雪白", "秀珍", "洋菇", "雜菇", "綜合菇", "乾香菇",
        "蔬菜類", "芽菜", "瓜菜", "根菜", "莖菜", "葉菜", "包葉菜", "花菜", "果菜", "豆菜", "生菜",
        "雜糧特用類", "雜糧特用", "水果類", "水果",
        "其他農產類", "花草", "蜂類", "藻類", "堅果類",
        "截切加工", "截切", "加工品", "樣品", "跨類綜合", "代收付產品",
        "雜項", "收入", "折讓", "製造費用", "營業費用", "其他支出",
        "包材", "貼紙", "包裝托盤/盒", "包裝袋", "保鮮膜", "袋膜", "紙箱", "袖套", "套印", "其他", "物流籃", "棧板"
    ];

    categoryTree.forEach((name, index) => { categoryOrderMap[name] = index; });

    function parseCSV(text) {
        let lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') { lines.push(row); }
        return lines;
    }

    function checkAuth() {
        const savedAuthTime = localStorage.getItem('gl_auth_time');
        const now = Date.now();
        if (savedAuthTime && (now - parseInt(savedAuthTime)) < AUTH_TIMEOUT) {
            showApp();
        } else {
            showLogin();
        }
    }

    function showApp() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('status').style.display = 'block';
        initApp();
    }

    function showLogin() {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
        
        const pwdInput = document.getElementById('password-input');
        pwdInput.value = '';
        pwdInput.focus();

        document.getElementById('btn-submit-pwd').onclick = validatePassword;
        pwdInput.onkeydown = function(e) {
            if (e.key === 'Enter') validatePassword();
        };

        document.getElementById('btn-toggle-pwd').onclick = function() {
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.innerHTML = `<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-4 .7l2.17 2.17C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.07 21 20.5 19.57 3.43 2.83 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.1-3.21l1.91 1.91C13.13 8.18 12.59 8 12 8c-2.21 0-4 1.79-4 4 0 .59.18 1.13.5 1.54l1.91 1.91c.05-.14.09-.3.09-.45 0-1.1.9-2 2-2 .15 0 .31.04.45.09z"/>`;
            } else {
                pwdInput.type = "password";
                eyeIcon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
            }
        };
    }

    function validatePassword() {
        const pwdInput = document.getElementById('password-input');
        const errorMsg = document.getElementById('login-error-msg');
        if (pwdInput.value === SYSTEM_PASSWORD) {
            errorMsg.style.display = 'none';
            localStorage.setItem('gl_auth_time', Date.now().toString());
            showApp();
        } else {
            errorMsg.style.display = 'block';
            pwdInput.value = '';
            pwdInput.focus();
        }
    }

    function handleLogout() {
        localStorage.removeItem('gl_auth_time');
        if (countdownInterval) clearInterval(countdownInterval);
        isFirstLoad = true;
        document.getElementById('status').style.display = 'none';
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('refresh-info-panel').style.display = 'none';
        document.getElementById('category-select').innerHTML = '<option value="ALL">-- 全部品類 --</option>';
        showLogin();
    }

    function compareCategories(a, b) {
        const orderA = categoryOrderMap[a] !== undefined ? categoryOrderMap[a] : 9999;
        const orderB = categoryOrderMap[b] !== undefined ? categoryOrderMap[b] : 9999;
        if (orderA !== orderB) return orderA - orderB;
        return a.localeCompare(b, 'zh-Hant');
    }

    function compareWarehouses(a, b) {
        const infoA = whOrderMap[a.name];
        const infoB = whOrderMap[b.name];
        const fA = infoA ? infoA.factory : 'unknown';
        const fB = infoB ? infoB.factory : 'unknown';

        if (fA !== fB) {
            if (fA === 'factory1') return -1;
            if (fB === 'factory1') return 1;
            if (fA === 'factory2') return -1;
            if (fB === 'factory2') return 1;
        }
        const scoreA = infoA ? infoA.score : 999;
        const scoreB = infoB ? infoB.score : 999;
        return scoreA - scoreB;
    }

    function updateLastUpdatedTime() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('last-update-time').textContent = `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
    }

    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        countdown = 30;
        document.getElementById('next-update-countdown').textContent = countdown;
        countdownInterval = setInterval(() => {
            countdown--;
            if (countdown < 0) {
                clearInterval(countdownInterval);
                fetchData(); 
            } else {
                document.getElementById('next-update-countdown').textContent = countdown;
            }
        }, 1000);
    }

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("無法讀取雲端資料，請確認連結是否正確且已公開發布。");
            const dataText = await response.text();
            
            const rows = parseCSV(dataText);
            if (rows.length < 2) throw new Error("試算表內沒有足夠的資料。");

            headers = rows[0].map(h => h.trim());
            for (let i = 0; i < headers.length; i++) {
                if (/(數量|庫存|存量|現存|結存|盤點|qty|stock|amount)/i.test(headers[i]) && i > colNameWarehouse) {
                    colNameQty = i;
                    break;
                }
            }
            if (colNameQty === -1) colNameQty = headers.length - 1;

            rawData = rows.slice(1).filter(r => r.length === headers.length && r.some(cell => cell !== '')).map(r => {
                let obj = {};
                headers.forEach((h, i) => { obj[h] = r[i] ? r[i].trim() : ''; });
                return obj;
            });

            if (isFirstLoad) {
                const categories = new Set();
                rawData.forEach(item => { if (item[headers[colNameCategory]]) categories.add(item[headers[colNameCategory]].trim()); });
                const sortedCategories = Array.from(categories).sort(compareCategories);

                const catSelect = document.getElementById('category-select');
                sortedCategories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    catSelect.appendChild(option);
                });

                document.getElementById('status').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('refresh-info-panel').style.display = 'flex';

                loadSavedSettings();
                isFirstLoad = false;
            } else {
                renderTable();
            }

            updateLastUpdatedTime();
            startCountdown();

        } catch (error) {
            console.error(error);
            if (isFirstLoad) {
                const statusEl = document.getElementById('status');
                statusEl.className = "status-message error";
                statusEl.style.display = "block";
                statusEl.textContent = "讀取失敗: " + error.message;
            } else {
                console.log("自動背景刷新失敗: " + error.message);
                setTimeout(fetchData, 5000);
            }
        }
    }

    async function initApp() {
        document.getElementById('btn-clear-all').onclick = clearAllFilters;
        document.getElementById('btn-logout').onclick = handleLogout;

        // 【關鍵修復】重新補回下拉選單與搜尋框的監聽事件，讓選擇條件時表格能即時更新
        document.getElementById('factory-select').onchange = handleFactoryChange;
        document.getElementById('warehouse-select').onchange = handleWarehouseChange;
        document.getElementById('category-select').onchange = handleCategoryChange;
        document.getElementById('search-input').oninput = renderTable;

        await fetchData();
    }

    function handleFactoryChange() {
        const factorySelect = document.getElementById('factory-select');
        const warehouseSelect = document.getElementById('warehouse-select');
        const selectedFactory = factorySelect.value;

        warehouseSelect.innerHTML = '';

        const placeholderOpt = document.createElement('option');
        placeholderOpt.value = "";
        placeholderOpt.textContent = "-- 全部倉庫 --";
        warehouseSelect.appendChild(placeholderOpt);

        if (!selectedFactory) {
            const allWarehouses = [...factoryWarehouseMap.factory1, ...factoryWarehouseMap.factory2];
            allWarehouses.forEach(wh => {
                const option = document.createElement('option');
                option.value = wh;
                option.textContent = wh;
                warehouseSelect.appendChild(option);
            });
        } else {
            const targetWarehouses = factoryWarehouseMap[selectedFactory] || [];
            targetWarehouses.forEach(wh => {
                const option = document.createElement('option');
                option.value = wh;
                option.textContent = wh;
                warehouseSelect.appendChild(option);
            });
        }

        warehouseSelect.value = "";
        localStorage.setItem('saved_factory', selectedFactory);
        localStorage.setItem('saved_warehouse', "");
        renderTable();
    }

    function handleWarehouseChange() {
        localStorage.setItem('saved_warehouse', document.getElementById('warehouse-select').value);
        renderTable();
    }

    function handleCategoryChange() {
        localStorage.setItem('saved_category', document.getElementById('category-select').value);
        renderTable();
    }

    function loadSavedSettings() {
        const savedFactory = localStorage.getItem('saved_factory');
        const savedWarehouse = localStorage.getItem('saved_warehouse');
        const savedCategory = localStorage.getItem('saved_category');

        if (savedFactory !== null) document.getElementById('factory-select').value = savedFactory;
        handleFactoryChange();
        if (savedWarehouse !== null && savedWarehouse !== "") {
            const warehouseSelect = document.getElementById('warehouse-select');
            if (Array.from(warehouseSelect.options).some(opt => opt.value === savedWarehouse)) {
                warehouseSelect.value = savedWarehouse;
            }
        }
        if (savedCategory !== null) document.getElementById('category-select').value = savedCategory;
        
        renderTable();
    }

    function clearAllFilters() {
        document.getElementById('factory-select').value = "";
        handleFactoryChange(); 
        document.getElementById('category-select').value = "ALL";
        document.getElementById('search-input').value = "";

        localStorage.removeItem('saved_factory');
        localStorage.removeItem('saved_warehouse');
        localStorage.removeItem('saved_category');

        renderTable();
    }

    function parseStockValue(val) {
        if (!val) return 0;
        return parseFloat(val.replace(/,/g, '')) || 0;
    }

    function renderTable() {
        const activeFactory = document.getElementById('factory-select').value;
        const activeWarehouse = document.getElementById('warehouse-select').value; 
        const activeCategory = document.getElementById('category-select').value;
        const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
        
        const tableBody = document.getElementById('table-body');
        const tableHeaderLast = document.querySelector('#table-header th:last-child');
        
        const categoryKey = headers[colNameCategory];
        const productCodeKey = headers[colNameProductCode];
        const productNameKey = headers[colNameProductName];
        const unitKey = headers[colNameUnit];
        const warehouseKey = headers[colNameWarehouse];
        const qtyKey = headers[colNameQty];

        tableBody.innerHTML = '';

        let allowedWHS = [];
        if (activeFactory === "factory1") allowedWHS = factoryWarehouseMap.factory1;
        else if (activeFactory === "factory2") allowedWHS = factoryWarehouseMap.factory2;
        else allowedWHS = [...factoryWarehouseMap.factory1, ...factoryWarehouseMap.factory2];

        const isDefaultState = (!activeFactory && !activeWarehouse && activeCategory === "ALL" && !searchQuery);
        if (isDefaultState) {
            tableHeaderLast.textContent = '當前庫存 / 其他倉庫';
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#a0aec0; padding:50px; font-size:16px;">請先選擇廠別、倉庫或指定品類以載入庫存資料</td></tr>`;
            return;
        }

        tableHeaderLast.textContent = `當前庫存 (${qtyKey}) / 其他倉明細`;

        let filteredRows = rawData;

        if (activeWarehouse) {
            filteredRows = filteredRows.filter(item => item[warehouseKey] === activeWarehouse);
        } else {
            filteredRows = filteredRows.filter(item => allowedWHS.includes(item[warehouseKey]));
        }

        if (activeCategory !== 'ALL') {
            filteredRows = filteredRows.filter(item => {
                return (item[categoryKey] ? item[categoryKey].trim() : '') === activeCategory;
            });
        }

        if (searchQuery !== '') {
            filteredRows = filteredRows.filter(item => {
                return (item[categoryKey] && item[categoryKey].toLowerCase().includes(searchQuery)) ||
                       (item[productCodeKey] && item[productCodeKey].toLowerCase().includes(searchQuery)) ||
                       (item[productNameKey] && item[productNameKey].toLowerCase().includes(searchQuery)) ||
                       (item[unitKey] && item[unitKey].toLowerCase().includes(searchQuery)) ||
                       (item[warehouseKey] && item[warehouseKey].toLowerCase().includes(searchQuery));
            });
        }

        filteredRows.sort((a, b) => {
            const catA = a[categoryKey] ? a[categoryKey].trim() : '';
            const catB = b[categoryKey] ? b[categoryKey].trim() : '';
            return compareCategories(catA, catB);
        });

        filteredRows.forEach(item => {
            const currentWhName = item[warehouseKey] || '';
            const productCode = item[productCodeKey] || '';
            const productName = item[productNameKey] || '';
            const unitValue = item[unitKey] || '';
            const mainStockValueRaw = item[qtyKey] || '0';

            let badgesGrid = document.createElement('div');
            badgesGrid.className = 'stock-badges-grid';

            let otherWhsWithStock = [];
            rawData.forEach(allItem => {
                const isSameItem = (allItem[productCodeKey] === productCode) && (allItem[unitKey] === unitValue);
                const isOtherWarehouse = (allItem[warehouseKey] !== currentWhName);
                if (isSameItem && isOtherWarehouse) {
                    const otherWhQtyStr = allItem[qtyKey] || '0';
                    if (parseStockValue(otherWhQtyStr) > 0) {
                        otherWhsWithStock.push({ name: allItem[warehouseKey], qty: otherWhQtyStr });
                    }
                }
            });

            otherWhsWithStock.sort(compareWarehouses);

            if (otherWhsWithStock.length > 0) {
                otherWhsWithStock.forEach(wh => {
                    const pill = document.createElement('span');
                    const whInfo = whOrderMap[wh.name];
                    const factory = whInfo ? whInfo.factory : 'factory1';
                    pill.className = (factory === 'factory2') ? 'stock-badge-pill-f2' : 'stock-badge-pill-f1';
                    pill.textContent = `${wh.name}: ${wh.qty}`;
                    badgesGrid.appendChild(pill);
                });
            } else {
                const noStock = document.createElement('span');
                noStock.className = 'no-other-stock';
                noStock.textContent = '(其他倉無此品項)';
                badgesGrid.appendChild(noStock);
            }

            const tr = document.createElement('tr');

            const tdCat = document.createElement('td');
            tdCat.setAttribute('data-label', '品類');
            const spanCat = document.createElement('span');
            spanCat.textContent = item[categoryKey] || '-';
            tdCat.appendChild(spanCat);
            tr.appendChild(tdCat);

            const tdCode = document.createElement('td');
            tdCode.setAttribute('data-label', '品項代號');
            const spanCode = document.createElement('span');
            spanCode.textContent = productCode || '-';
            tdCode.appendChild(spanCode);
            tr.appendChild(tdCode);

            const tdName = document.createElement('td');
            tdName.setAttribute('data-label', '品名');
            const spanName = document.createElement('span');
            spanName.textContent = productName || '-';
            spanName.style.fontWeight = '600';
            tdName.appendChild(spanName);
            tr.appendChild(tdName);

            const tdUnit = document.createElement('td');
            tdUnit.setAttribute('data-label', '庫存單位');
            const spanUnit = document.createElement('span');
            spanUnit.textContent = unitValue || '-';
            tdUnit.appendChild(spanUnit);
            tr.appendChild(tdUnit);

            const tdWh = document.createElement('td');
            tdWh.setAttribute('data-label', '所屬倉庫');
            const spanWh = document.createElement('span');
            spanWh.textContent = currentWhName || '-';
            tdWh.appendChild(spanWh);
            tr.appendChild(tdWh);

            const tdStock = document.createElement('td');
            tdStock.setAttribute('data-label', '當前庫存 / 其他倉庫');
            tdStock.style.textAlign = 'right';

            const stockContainer = document.createElement('div');
            stockContainer.className = 'stock-container';
            const mainStockSpan = document.createElement('span');
            mainStockSpan.className = 'main-stock';
            mainStockSpan.textContent = mainStockValueRaw;

            stockContainer.appendChild(mainStockSpan);
            stockContainer.appendChild(badgesGrid);

            tdStock.appendChild(stockContainer);
            tr.appendChild(tdStock);

            tableBody.appendChild(tr);
        });

        if (filteredRows.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#a0aec0; padding:30px;">沒有找到符合搜尋條件的品項</td></tr>`;
        }
    }

    // 啟動身分驗證檢查
    window.onload = checkAuth;
</script>
